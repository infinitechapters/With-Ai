name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Backend
      - name: Install backend deps
        run: |
          cd backend
          npm install

      # Frontend
      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # Docker build test
      - name: Build Docker images
        run: |
          docker build -t backend ./backend
          docker build -t frontend ./frontend